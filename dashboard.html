<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<link rel="stylesheet"
href="css/style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

body{

background:
linear-gradient(
135deg,
#eaffef,
#f7fff8
);

}

.dashboard{

padding:60px;

}

.title{

text-align:center;

margin-bottom:40px;

}

.grid{

display:grid;

grid-template-columns:
repeat(2,1fr);

gap:30px;

max-width:900px;

margin:auto;

}

.card{

background:white;

padding:40px;

border-radius:20px;

text-align:center;

cursor:pointer;

box-shadow:
0 8px 25px
rgba(0,0,0,.08);

transition:.3s;

}

.card:hover{

transform:
translateY(-8px);

}

.icon{

font-size:60px;

}

.stats{

display:flex;

justify-content:center;

gap:20px;

margin-bottom:40px;

flex-wrap:wrap;

}

.stat{

background:white;

padding:20px;

border-radius:15px;

min-width:180px;

text-align:center;

box-shadow:
0 8px 20px
rgba(0,0,0,.06);

}

</style>

</head>


<body>


<section class="dashboard">

<div class="title">

<h1>

👋 Hello

<span id="user">

</span>

</h1>


<h4>

Welcome Back

</h4>


<br>


<button
class="btn btn-success"
onclick="location.href='index.html'">

🏠 Home

</button>

<button
class="btn btn-danger"

onclick="logout()">

Logout

</button>

</div>



<div class="stats">

<div class="stat">

🚗

<h2 id="rides">

0

</h2>

<p>

Total Rides

</p>

</div>



<div class="stat">

📖

<h2>

1

</h2>

<p>

Total Bookings

</p>

</div>



<div class="stat">

🌱

<h2>

CO₂

</h2>

<p>

Calculator Enabled

</p>

</div>

</div>



<div

class="grid"

id="dashboard">

</div>

</section>



<script>

let user=

localStorage.getItem(
"carpoolUser"
);

document
.getElementById(
"user"
)
.innerHTML=

user||

"User";



async function loadStats(){

try{

let response=

await fetch(

"http://localhost:3000/rides"

);

let rides=

await response.json();

document
.getElementById(
"rides"
)
.innerHTML=

rides.length;

}

catch{}

}

loadStats();



let role=

localStorage.getItem(
"role"
);



let dashboard=

document
.getElementById(
"dashboard"
);



if(

role==="driver"

){

dashboard.innerHTML=

`

<div
class="card"

onclick="location.href='postRide.html'">

<div class="icon">

🚗

</div>

<h3>

Post Ride

</h3>

</div>



<div
class="card"

onclick="location.href='history.html'">

<div class="icon">

📚

</div>

<h3>

Ride History

</h3>

</div>

`;

}



else{

dashboard.innerHTML=

`

<div
class="card"

onclick="location.href='searchRide.html'">

<div class="icon">

🔎

</div>

<h3>

Search Ride

</h3>

</div>



<div
class="card"

onclick="location.href='map.html'">

<div class="icon">

🗺️

</div>

<h3>

Track Ride

</h3>

</div>

`;

}



function logout(){

let ok=

confirm(

"Are you sure you want to logout?"

);

if(!ok)

return;



localStorage.removeItem(
"carpoolUser"
);

localStorage.removeItem(
"role"
);



window.location.replace(

"login.html"

);

}

</script>


</body>

</html>
