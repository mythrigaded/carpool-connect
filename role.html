<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Role | CarPool Connect</title>

<link rel="stylesheet"
href="css/style.css">

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<script>

if(
!localStorage.getItem(
"carpoolUser"
)
){

window.location=
"login.html";

}


function logout(){

localStorage.removeItem(
"carpoolUser"
);

localStorage.removeItem(
"rides"
);

localStorage.removeItem(
"bookings"
);

sessionStorage.clear();

window.location.href=
"login.html";

}

</script>


<nav class="navbar navbar-expand-lg navbar-light custom-navbar">

<div class="container">

<a
class="navbar-brand brand-logo"
href="index.html">

🚗 CarPool Connect

</a>

<button
class="btn btn-danger"
onclick="logout()">

Logout

</button>

</div>

</nav>


<section
class="login-section">

<div
class="text-center">

<h1>

Welcome

</h1>

<h2>

Choose Option

</h2>

<br>

<a
href="postRide.html"
class="btn btn-success">

Post Ride

</a>

<br><br>

<a
href="searchRide.html"
class="btn btn-primary">

Search Ride

</a>

<br><br>

<a
href="history.html"
class="btn btn-dark">

Ride History

</a>

</div>

</section>

</body>

</html>
