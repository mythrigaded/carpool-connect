<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Role | CarPool Connect</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<script>

if (!localStorage.getItem("carpoolUser")) {
window.location.href="login.html";
}

function logout(){

localStorage.removeItem("carpoolUser");

localStorage.removeItem("rides");

localStorage.removeItem("bookings");

localStorage.removeItem("selectedRide");

sessionStorage.clear();

window.location.href="index.html";

}

</script>


<nav class="navbar navbar-expand-lg navbar-light custom-navbar">

<div class="container">

<a class="navbar-brand brand-logo" href="index.html">

🚗 CarPool Connect

</a>

<button
class="btn btn-danger"
onclick="logout()">

Logout

</button>

</div>

</nav>


<section class="login-section">

<div class="container text-center">

<h1 class="mb-3">

Welcome

</h1>

<h2 class="mb-5">

Choose Option

</h2>


<div class="d-grid gap-3 col-md-4 mx-auto">

<a
href="postRide.html"
class="btn btn-success btn-lg">

Post Ride

</a>


<a
href="searchRide.html"
class="btn btn-primary btn-lg">

Search Ride

</a>


<a
href="history.html"
class="btn btn-dark btn-lg">

Ride History

</a>

</div>

</div>

</section>

</body>

</html>
