<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Choose Role</title>

<link rel="stylesheet"
href="css/style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

body{

background:
linear-gradient(
135deg,
#e8fff0,
#f4fff7
);

}

.role-page{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

}

.role-box{

width:900px;

text-align:center;

}

.role-grid{

display:flex;

gap:40px;

justify-content:center;

margin-top:50px;

}

.role-card{

background:white;

width:300px;

padding:40px;

border-radius:20px;

cursor:pointer;

transition:0.3s;

box-shadow:
0 10px 25px
rgba(0,0,0,0.08);

}

.role-card:hover{

transform:
translateY(-10px);

}

.icon{

font-size:70px;

}

</style>

</head>


<body>


<section class="role-page">

<div class="role-box">

<h1>

👋 Hello

<span id="userName"></span>

</h1>

<h4>

Choose Your Role

</h4>


<div class="role-grid">


<div
class="role-card"

onclick="choosePassenger()">

<div class="icon">

🧍

</div>

<h3>

Passenger

</h3>

<p>

Book rides

</p>

</div>



<div
class="role-card"

onclick="chooseDriver()">

<div class="icon">

🚗

</div>

<h3>

Driver

</h3>

<p>

Post rides

</p>

</div>


</div>


</div>

</section>



<script>

let user =

localStorage.getItem(

"carpoolUser"

);

document

.getElementById(

"userName"

)

.innerHTML =

user ||
"User";



function choosePassenger(){

localStorage.setItem(

"role",

"passenger"

);

window.location.href=

"dashboard.html";

}



function chooseDriver(){

localStorage.setItem(

"role",

"driver"

);

window.location.href=

"dashboard.html";

}

</script>


</body>

</html>
