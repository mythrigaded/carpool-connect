<!DOCTYPE html>
<html>

<head>

<title>Post Ride</title>

<link rel="stylesheet"
href="css/style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-light custom-navbar">

<div class="container">

<a class="navbar-brand"
href="index.html">

🚗 CarPool Connect

</a>

</div>

</nav>


<section class="login-section">

<div class="login-card">

<h2>Offer Ride</h2>

<input
id="driver"
placeholder="Driver Name">

<input
id="vehicle"
placeholder="Vehicle">

<input
id="pickup"
placeholder="Pickup">

<input
id="destination"
placeholder="Destination">

<input
id="seats"
type="number"
placeholder="Seats">

<input
id="price"
type="number"
placeholder="Price">

<button
class="login-submit"
onclick="postRide()">

Post Ride

</button>

</div>

</section>


<script>

async function postRide(){

try{

let data={

driver:
document.getElementById(
"driver"
).value,

vehicle:
document.getElementById(
"vehicle"
).value,

pickup:
document.getElementById(
"pickup"
).value,

destination:
document.getElementById(
"destination"
).value,

seats:
document.getElementById(
"seats"
).value,

price:
document.getElementById(
"price"
).value

};


let response=
await fetch(

"https://carpool-backend-t4ar.onrender.com/ride",

{

method:"POST",

headers:{

"Content-Type":
"application/json"

},

body:
JSON.stringify(
data
)

}

);


let result=
await response.json();

alert(
result.message
);


if(
response.ok
){

window.location.href=
"searchRide.html";

}

}

catch{

alert(
"Backend not connected"
);

}

}

</script>

</body>

</html>
