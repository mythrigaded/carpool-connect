<!DOCTYPE html>
<html>

<head>

<title>Post Ride</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<section class="login-section">

<form class="post-card">

<h2>Offer Ride</h2>

<input
id="pickup"
type="text"
placeholder="Pickup Location">

<input
id="destination"
type="text"
placeholder="Destination">

<input
id="seats"
type="number"
placeholder="Seats Available">

<input
id="price"
type="number"
placeholder="Price">

<button
type="button"
class="post-btn"
onclick="postRide()">

Post Ride

</button>

</form>

</section>


<div
id="successScreen"
class="success-screen">

<div class="success-box">

<div class="checkmark">

✔

</div>

<h2>

Ride Posted Successfully

</h2>

<p>

Your ride is now available.

</p>

</div>

</div>



<script>

async function postRide(){

let pickup=
document
.getElementById(
"pickup"
)
.value
.trim();


let destination=
document
.getElementById(
"destination"
)
.value
.trim();


let seats=
document
.getElementById(
"seats"
)
.value;


let price=
document
.getElementById(
"price"
)
.value;



if(

pickup===""

||

destination===""

||

seats===""

||

price===""

){

alert(

"Fill all fields"

);

return;

}



try{

let response=

await fetch(

"http://https://carpoolconnect-backend.onrender.com/ride",

{

method:"POST",

headers:{

"Content-Type":

"application/json"

},

body:

JSON.stringify({

driver:

localStorage.getItem(
"carpoolUser"
)

||

"Driver",


vehicle:

"Car",


pickup,

destination,

seats,

price

})

}

);



let data=
await response.json();

console.log(data);



document

.getElementById(
"successScreen"
)

.classList

.add(
"active"
);



setTimeout(()=>{

window.location.href=

"dashboard.html";

},2500);

}

catch{

alert(

"Backend not connected"

);

}

}

</script>
<script>

let user=
localStorage.getItem("carpoolUser");

if(user){

let nav=
document.getElementById("userArea");

if(nav){

nav.innerHTML=
`
👋 Hello, ${user}
|
<button
onclick="logoutUser()"
style="
border:none;
background:none;
color:black;
">
Logout
</button>
`;

}

}

function logoutUser(){

localStorage.removeItem(
"carpoolUser"
);

window.location=
"login.html";

}

</script>
</body>

</html>
