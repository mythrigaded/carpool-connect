<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Booking | CarPool Connect</title>

<link rel="stylesheet" href="css/style.css">

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-light custom-navbar">

<div class="container">

<a class="navbar-brand brand-logo" href="index.html">
🚗 CarPool Connect
</a>

</div>

</nav>


<section class="login-section">

<div class="login-card">

<h2>Confirm Ride</h2>

<input
id="name"
type="text"
placeholder="Name">

<input
id="phone"
type="tel"
placeholder="Phone">

<select id="vehicle">

<option value="18">
SUV (18 km/L)
</option>

<option value="22">
Sedan (22 km/L)
</option>

<option value="30">
Bike (30 km/L)
</option>

</select>

<input
id="distance"
type="number"
placeholder="Distance">

<div id="result">

<p id="fuel">
🚗 Fuel Used: 0 L
</p>

<p id="cost">
💸 Fuel Cost: ₹0
</p>

<p id="co2">
🌱 CO₂: 0 kg
</p>

</div>

<button
class="login-submit"
onclick="confirmBooking()">

Confirm Booking

</button>

</div>

</section>


<script>

document
.getElementById("distance")
.addEventListener(
"input",
calculate
);

document
.getElementById("vehicle")
.addEventListener(
"change",
calculate
);


function calculate(){

let distance =
Number(
document
.getElementById(
"distance"
).value
) || 0;

let mileage =
Number(
document
.getElementById(
"vehicle"
).value
);

let fuel =
distance/mileage;

let cost =
fuel*100;

let co2 =
fuel*2.3;

document
.getElementById(
"fuel"
)
.innerText=
"🚗 Fuel Used: "
+
fuel.toFixed(1);

document
.getElementById(
"cost"
)
.innerText=
"💸 Fuel Cost: ₹"
+
cost.toFixed(0);

document
.getElementById(
"co2"
)
.innerText=
"🌱 CO₂: "
+
co2.toFixed(1);

}



async function confirmBooking(){

try{

let name =
document
.getElementById(
"name"
).value;

let phone =
document
.getElementById(
"phone"
).value;

let distance =
Number(
document
.getElementById(
"distance"
).value
);

let mileage =
Number(
document
.getElementById(
"vehicle"
).value
);

if(
!name||
!phone||
!distance
){

alert(
"Fill all fields"
);

return;

}

let fuel =
Number(
(distance/mileage)
.toFixed(1)
);

let cost =
Number(
(fuel*100)
.toFixed(0)
);

let co2 =
Number(
(fuel*2.3)
.toFixed(1)
);


let response =
await fetch(

"https://carpool-backend-t4ar.onrender.com/book",

{

method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:
JSON.stringify({

name,
phone,
distance,
fuel,
cost,
co2

})

}

);


let data =
await response.json();

alert(
data.message
);

if(
response.ok
){

window.location.href=
"history.html";

}

}
catch(error){

console.log(error);

alert(
"Booking Failed"
);

}

}

</script>

</body>

</html>
