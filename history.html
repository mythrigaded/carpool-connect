<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Ride History</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{

font-family:Poppins,sans-serif;

background:#f6fff8;

margin:0;

padding:50px;

}

.container{

max-width:900px;

margin:auto;

}

.title{

text-align:center;

margin-bottom:50px;

}

.section{

background:white;

padding:30px;

border-radius:20px;

margin-bottom:30px;

box-shadow:0 8px 20px rgba(0,0,0,.08);

}

.section h2{

margin-bottom:20px;

color:#198754;

}

.ride{

background:#f8fff8;

padding:20px;

border-radius:15px;

margin-top:15px;

line-height:1.8;

}

.empty{

color:gray;

}

</style>

</head>


<body>

<div class="container">

<div class="title">

<h1>

Ride History

</h1>

</div>



<div class="section">

<h2>

Rides Posted By You

</h2>

<div id="posted">

Loading...

</div>

</div>



<div class="section">

<h2>

Rides Taken By You

</h2>

<div id="taken">

No rides booked

</div>

</div>


</div>



<script>

async function loadHistory(){

let user=

localStorage.getItem(
"carpoolUser"
);



let response=

await fetch(

"http://localhost:3000/rides"

);



let rides=

await response.json();



let myRides=

rides.filter(

r=>

r.driver===user

);



let html="";



myRides.forEach(r=>{

html+=`

<div class="ride">

Pickup:

${r.pickup}

<br>

Destination:

${r.destination}

<br>

Seats:

${r.seats}

<br>

Price:

₹${r.price}

</div>

`;

});



if(html===""){

html=

`<div class="empty">

No rides posted

</div>`;

}



document
.getElementById(
"posted"
)
.innerHTML=

html;



let booked=

JSON.parse(

localStorage.getItem(

"bookedRides"

)

||

"[]"

);



let taken="";



booked.forEach(r=>{

taken+=`

<div class="ride">

${r.pickup}

→

${r.destination}

</div>

`;

});



if(taken===""){

taken=

`<div class="empty">

No rides booked

</div>`;

}



document
.getElementById(
"taken"
)
.innerHTML=

taken;

}



loadHistory();

</script>
<script>

let user=
localStorage.getItem("carpoolUser");

if(user){

let nav=
document.getElementById("userArea");

if(nav){

nav.innerHTML=
`
👋 Hello, ${user}
|
<button
onclick="logoutUser()"
style="
border:none;
background:none;
color:black;
">
Logout
</button>
`;

}

}

function logoutUser(){

localStorage.removeItem(
"carpoolUser"
);

window.location=
"login.html";

}

</script>
<script>

function navbar(){

let user=

localStorage.getItem(
"carpoolUser"
);

let area=

document.getElementById(
"userArea"
);

if(!area)
return;


if(user){

area.innerHTML=

`
👋 Hello ${user}

<button

onclick="logout()"

style="
margin-left:10px;
background:#dc3545;
color:white;
border:none;
padding:8px 14px;
border-radius:8px;
">

Logout

</button>
`;

}

else{

area.innerHTML=

`

<a
class="login-btn"
href="login.html">

Login

</a>

`;

}

}



function logout(){

localStorage.removeItem(
"carpoolUser"
);

localStorage.removeItem(
"role"
);

window.location=

"index.html";

}



navbar();

</script>
</body>

</html>
