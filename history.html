<!DOCTYPE html>
<html>

<head>

<title>Ride History</title>

<link rel="stylesheet"
href="css/style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h1 class="text-center">

Ride History

</h1>

<br>

<div class="card p-4 mb-4">

<h2>

Rides Posted By You

</h2>

<div id="posted">

Loading...

</div>

</div>


<div class="card p-4">

<h2>

Rides Taken By You

</h2>

<div id="booked">

Loading...

</div>

</div>

</div>


<script>

let currentUser=
localStorage.getItem(
"carpoolUser"
);

if(
!currentUser
){

window.location=
"login.html";

}


async function loadHistory(){

try{

let response=
await fetch(
"https://carpool-backend-t4ar.onrender.com/rides"
);

let rides=
await response.json();

let myRides=
rides.filter(

ride=>

ride.driver===currentUser

);

let posted=
document.getElementById(
"posted"
);

posted.innerHTML="";

if(
myRides.length===0
){

posted.innerHTML=
"No rides";

}
else{

myRides.forEach(

ride=>{

posted.innerHTML+=`

<div>

<b>${ride.driver}</b>

<br>

${ride.pickup}
→
${ride.destination}

<br>

Seats:
${ride.seats}

<br>

₹${ride.price}

<hr>

</div>

`;

}

);

}

}
catch{

document
.getElementById(
"posted"
)
.innerHTML=
"Cannot load";

}

document
.getElementById(
"booked"
)
.innerHTML=
"No rides booked";

}

loadHistory();

</script>

</body>

</html>
