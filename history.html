<!DOCTYPE html>
<html>

<head>

<title>Ride History</title>

<link rel="stylesheet"
href="css/style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h1 class="text-center mb-5">

Ride History

</h1>


<div class="card p-4 mb-4">

<h2>

Rides Posted By You

</h2>

<div id="posted">

Loading...

</div>

</div>


<div class="card p-4">

<h2>

Rides Taken By You

</h2>

<div id="booked">

Loading...

</div>

</div>

</div>


<script>

async function loadHistory(){

try{

let response=
await fetch(
"https://carpool-backend-t4ar.onrender.com/rides"
);

let rides=
await response.json();

let posted=
document.getElementById(
"posted"
);

if(
rides.length===0
){

posted.innerHTML=
"No rides posted";

return;

}

posted.innerHTML="";

rides.forEach(

ride=>{

posted.innerHTML+=`

<div
style="
padding:10px;
border-bottom:1px solid #ddd;
">

<b>${ride.driver}</b>

<br>

${ride.pickup}

→

${ride.destination}

<br>

Seats:
${ride.seats}

<br>

₹${ride.price}

</div>

`;

}

);

}
catch{

document
.getElementById(
"posted"
)
.innerHTML=

"Cannot load rides";

}

document
.getElementById(
"booked"
)
.innerHTML=

"Bookings saved";

}

loadHistory();

</script>

</body>

</html>
